<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teşekkürler — DairyMind™</title>
  <link rel="stylesheet" href="/vendor/tailwind.css?v=20260614d" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-gradient-to-br from-emerald-50 via-white to-sky-50 min-h-screen flex items-center justify-center px-6 antialiased text-slate-800">
  <div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl shadow-emerald-100 border border-slate-200 p-8 md:p-12 text-center">
    <div class="w-20 h-20 mx-auto rounded-full bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center text-white text-4xl shadow-lg shadow-emerald-200 mb-6">
      ✓
    </div>
    <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-3">Teşekkür ederiz! 🌾</h1>
    <p class="text-slate-600 leading-relaxed mb-6">
      Anketiniz başarıyla kaydedildi. <br/>
      DairyMind ekibi cevaplarınızı inceleyip <strong>48 saat içinde</strong> sizinle iletişime geçecek.
    </p>

    <div class="grid grid-cols-3 gap-3 mb-8">
      <div class="bg-emerald-50 rounded-xl p-3">
        <div class="text-2xl mb-1">🧠</div>
        <div class="text-xs font-semibold text-emerald-800">Veri Analizi</div>
      </div>
      <div class="bg-sky-50 rounded-xl p-3">
        <div class="text-2xl mb-1">📊</div>
        <div class="text-xs font-semibold text-sky-800">Dijital İkiz</div>
      </div>
      <div class="bg-amber-50 rounded-xl p-3">
        <div class="text-2xl mb-1">📞</div>
        <div class="text-xs font-semibold text-amber-800">Geri Dönüş</div>
      </div>
    </div>

    <div class="space-y-2">
      <a href="/" class="block w-full py-3 rounded-xl bg-emerald-600 text-white font-semibold hover:bg-emerald-700 transition shadow-md">
        Ana Sayfaya Dön
      </a>
      <a :href="`/anket/${window.location.pathname.split('/').pop()}`" id="continueBtn"
        class="block w-full py-3 rounded-xl bg-slate-100 text-slate-700 font-semibold hover:bg-slate-200 transition">
        Cevaplarımı Düzenle
      </a>
    </div>

    <p class="mt-8 text-xs text-slate-400">DairyMind™ · KVKK uyumlu · v1.0</p>
  </div>

  <script>
    document.getElementById('continueBtn').href = '/anket/' + window.location.pathname.split('/').pop();
  </script>
</body>
</html>
