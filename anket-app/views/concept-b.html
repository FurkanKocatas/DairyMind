<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konsept B — Çizgi Film Çiftlik İnşası</title>
  <link rel="stylesheet" href="/vendor/tailwind.css?v=20260614d" />
  <script defer src="/vendor/alpine.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fredoka:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
    .game-font { font-family: 'Fredoka', sans-serif; }

    .stage-bg {
      background:
        linear-gradient(180deg, #fde68a 0%, #fbbf24 8%, #38bdf8 15%, #7dd3fc 45%, #86efac 50%, #65a30d 100%);
    }

    /* Cloud drift */
    .cloud { animation: drift 35s linear infinite; }
    .cloud-2 { animation: drift 50s linear infinite; animation-delay: -10s; }
    .cloud-3 { animation: drift 60s linear infinite; animation-delay: -30s; }
    @keyframes drift {
      from { transform: translateX(-200px); }
      to   { transform: translateX(1200px); }
    }

    /* Building pop-in */
    .pop-in {
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      transform-origin: center bottom;
    }
    @keyframes popIn {
      0%   { opacity: 0; transform: translateY(80px) scale(0.4) rotate(-8deg); }
      60%  { opacity: 1; transform: translateY(-8px) scale(1.05) rotate(2deg); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
    }

    /* Cow walk */
    .cow-walk { animation: cowWalk 8s linear infinite; }
    @keyframes cowWalk {
      0%   { transform: translateX(0); }
      45%  { transform: translateX(280px); }
      50%  { transform: translateX(280px) scaleX(-1); }
      95%  { transform: translateX(0) scaleX(-1); }
      100% { transform: translateX(0); }
    }

    .bounce-soft { animation: bounce 2.5s ease-in-out infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .spin-slow { animation: spin 6s linear infinite; transform-origin: center; }
    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

    .smoke-rise { animation: smokeRise 5s ease-in-out infinite; }
    @keyframes smokeRise {
      0%   { opacity: 0; transform: translateY(0) scale(0.4); }
      30%  { opacity: 0.7; }
      100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
    }

    .sun-rays {
      animation: sunPulse 4s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes sunPulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%      { transform: scale(1.1); opacity: 0.9; }
    }

    .build-flash {
      animation: flash 0.6s ease-out;
    }
    @keyframes flash {
      0%   { filter: brightness(2) drop-shadow(0 0 20px yellow); }
      100% { filter: brightness(1); }
    }

    .grass-blade {
      animation: sway 2.5s ease-in-out infinite;
      transform-origin: bottom;
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-2deg); }
      50%      { transform: rotate(2deg); }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

<div x-data="builder()" x-init="init()" class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-400 to-amber-600 flex items-center justify-center text-white text-xl">🌾</div>
      <div>
        <div class="text-[10px] font-bold tracking-wider text-orange-700 uppercase">DairyMind™ · Konsept B</div>
        <div class="text-base font-bold text-slate-900 game-font">Çizgi Film Çiftlik İnşası</div>
      </div>
    </div>
    <div class="flex gap-2">
      <a href="/concept-a" class="px-3 py-1.5 text-xs font-semibold text-slate-600 hover:text-slate-900 rounded-md hover:bg-slate-100 transition">← Konsept A</a>
      <a href="/" class="px-3 py-1.5 text-xs font-semibold text-slate-600 hover:text-slate-900 rounded-md hover:bg-slate-100 transition">Ana sayfa</a>
    </div>
  </header>

  <div class="flex-1 grid lg:grid-cols-[340px_1fr] gap-0">

    <!-- Sidebar -->
    <aside class="bg-white border-r border-slate-200 p-5 overflow-y-auto" style="max-height: calc(100vh - 60px);">
      <div class="mb-5">
        <div class="text-xs font-bold text-orange-700 uppercase tracking-wider mb-1 game-font">DİJİTAL İKİZ KURULUMU</div>
        <h2 class="text-lg font-bold text-slate-900 game-font">Çiftliğinizi inşa edin</h2>
        <p class="text-xs text-slate-500 mt-1">Her seçim çiftliğe bir yapı ekler 🏗️</p>
      </div>

      <div class="mb-5 p-3 rounded-2xl bg-gradient-to-r from-orange-50 to-amber-50 border-2 border-orange-200">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs font-bold text-orange-900 game-font">İnşa İlerlemesi</span>
          <span class="text-xs font-mono text-orange-800"><span x-text="buildCount"></span>/8</span>
        </div>
        <div class="h-2 bg-orange-100 rounded-full overflow-hidden">
          <div class="h-full bg-gradient-to-r from-orange-400 to-amber-500 transition-all duration-700" :style="`width: ${Math.round(buildCount/8*100)}%`"></div>
        </div>
      </div>

      <div class="space-y-5">
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 game-font">🏠 Ahır Tipi</label>
          <div class="space-y-1.5">
            <template x-for="opt in opts.barn" :key="opt.id">
              <button @click="select('barn', opt.id)"
                :class="state.barn === opt.id ? 'border-orange-500 bg-orange-50 shadow-md' : 'border-slate-200 hover:border-orange-300 hover:bg-orange-50/50'"
                class="w-full text-left px-3 py-2 rounded-xl border-2 transition-all flex items-center gap-2">
                <span class="text-xl" x-text="opt.icon"></span>
                <span class="text-sm font-semibold text-slate-700" x-text="opt.label"></span>
                <span x-show="state.barn === opt.id" class="ml-auto text-orange-600">✓</span>
              </button>
            </template>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 game-font">🤖 Sağım Sistemi</label>
          <div class="space-y-1.5">
            <template x-for="opt in opts.parlor" :key="opt.id">
              <button @click="select('parlor', opt.id)"
                :class="state.parlor === opt.id ? 'border-orange-500 bg-orange-50 shadow-md' : 'border-slate-200 hover:border-orange-300 hover:bg-orange-50/50'"
                class="w-full text-left px-3 py-2 rounded-xl border-2 transition-all flex items-center gap-2">
                <span class="text-xl" x-text="opt.icon"></span>
                <span class="text-sm font-semibold text-slate-700" x-text="opt.label"></span>
                <span x-show="state.parlor === opt.id" class="ml-auto text-orange-600">✓</span>
              </button>
            </template>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 game-font">🥛 Süt Tankı</label>
          <div class="grid grid-cols-3 gap-1.5">
            <template x-for="opt in opts.tank" :key="opt.id">
              <button @click="select('tank', opt.id)"
                :class="state.tank === opt.id ? 'border-orange-500 bg-orange-50 shadow-md' : 'border-slate-200 hover:border-orange-300'"
                class="px-2 py-2 rounded-xl border-2 transition-all text-center">
                <div class="text-xl" x-text="opt.icon"></div>
                <div class="text-[10px] font-semibold text-slate-600 mt-0.5" x-text="opt.label"></div>
              </button>
            </template>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 game-font">🌾 Silaj Deposu</label>
          <div class="grid grid-cols-3 gap-1.5">
            <template x-for="opt in opts.silo" :key="opt.id">
              <button @click="select('silo', opt.id)"
                :class="state.silo === opt.id ? 'border-orange-500 bg-orange-50 shadow-md' : 'border-slate-200 hover:border-orange-300'"
                class="px-2 py-2 rounded-xl border-2 transition-all text-center">
                <div class="text-xl" x-text="opt.icon"></div>
                <div class="text-[10px] font-semibold text-slate-600 mt-0.5" x-text="opt.label"></div>
              </button>
            </template>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 game-font">⚡ Enerji Kaynağı</label>
          <div class="space-y-1.5">
            <template x-for="opt in opts.energy" :key="opt.id">
              <button @click="select('energy', opt.id)"
                :class="state.energy === opt.id ? 'border-orange-500 bg-orange-50 shadow-md' : 'border-slate-200 hover:border-orange-300 hover:bg-orange-50/50'"
                class="w-full text-left px-3 py-2 rounded-xl border-2 transition-all flex items-center gap-2">
                <span class="text-xl" x-text="opt.icon"></span>
                <span class="text-sm font-semibold text-slate-700" x-text="opt.label"></span>
                <span x-show="state.energy === opt.id" class="ml-auto text-orange-600">✓</span>
              </button>
            </template>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 game-font">💧 Su Kaynağı</label>
          <div class="grid grid-cols-3 gap-1.5">
            <template x-for="opt in opts.water" :key="opt.id">
              <button @click="select('water', opt.id)"
                :class="state.water === opt.id ? 'border-orange-500 bg-orange-50 shadow-md' : 'border-slate-200 hover:border-orange-300'"
                class="px-2 py-2 rounded-xl border-2 transition-all text-center">
                <div class="text-xl" x-text="opt.icon"></div>
                <div class="text-[10px] font-semibold text-slate-600 mt-0.5" x-text="opt.label"></div>
              </button>
            </template>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 game-font">♻️ Atık / Gübre</label>
          <div class="grid grid-cols-3 gap-1.5">
            <template x-for="opt in opts.manure" :key="opt.id">
              <button @click="select('manure', opt.id)"
                :class="state.manure === opt.id ? 'border-orange-500 bg-orange-50 shadow-md' : 'border-slate-200 hover:border-orange-300'"
                class="px-2 py-2 rounded-xl border-2 transition-all text-center">
                <div class="text-xl" x-text="opt.icon"></div>
                <div class="text-[10px] font-semibold text-slate-600 mt-0.5" x-text="opt.label"></div>
              </button>
            </template>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 game-font">🐄 Sürü Büyüklüğü</label>
          <div class="px-3 py-2 rounded-xl border-2 border-slate-200">
            <input type="range" min="0" max="50" step="2" x-model.number="state.herdSize"
              class="w-full accent-orange-600" />
            <div class="flex justify-between text-xs text-slate-500 mt-1">
              <span>0</span>
              <span class="font-bold text-orange-700 text-sm" x-text="state.herdSize + ' baş'"></span>
              <span>50+</span>
            </div>
          </div>
        </div>

        <button @click="reset()" class="w-full mt-2 py-2 rounded-xl bg-slate-100 text-slate-600 text-xs font-semibold hover:bg-slate-200 transition">↻ Sıfırla</button>
      </div>
    </aside>

    <!-- Stage -->
    <main class="stage-bg relative overflow-hidden" style="min-height: calc(100vh - 60px);">

      <!-- Sun -->
      <svg viewBox="0 0 80 80" class="absolute top-4 right-8 w-20 h-20 z-10">
        <g class="sun-rays">
          <circle cx="40" cy="40" r="34" fill="#fde68a" opacity="0.4"/>
          <circle cx="40" cy="40" r="28" fill="#fcd34d" opacity="0.6"/>
        </g>
        <circle cx="40" cy="40" r="20" fill="#fbbf24"/>
        <circle cx="40" cy="40" r="16" fill="#f59e0b"/>
        <circle cx="35" cy="36" r="3" fill="white" opacity="0.5"/>
      </svg>

      <!-- Clouds -->
      <svg viewBox="0 0 100 40" class="absolute top-10 cloud w-32 h-16 opacity-90" preserveAspectRatio="none">
        <ellipse cx="20" cy="25" rx="18" ry="10" fill="white"/>
        <ellipse cx="40" cy="20" rx="22" ry="13" fill="white"/>
        <ellipse cx="65" cy="25" rx="20" ry="11" fill="white"/>
        <ellipse cx="80" cy="28" rx="14" ry="8" fill="white"/>
      </svg>
      <svg viewBox="0 0 100 40" class="absolute top-24 cloud-2 w-24 h-12 opacity-80" preserveAspectRatio="none">
        <ellipse cx="20" cy="20" rx="15" ry="9" fill="white"/>
        <ellipse cx="40" cy="18" rx="18" ry="10" fill="white"/>
        <ellipse cx="60" cy="22" rx="14" ry="8" fill="white"/>
      </svg>
      <svg viewBox="0 0 100 40" class="absolute top-6 cloud-3 w-20 h-10 opacity-70" preserveAspectRatio="none">
        <ellipse cx="20" cy="20" rx="13" ry="7" fill="white"/>
        <ellipse cx="40" cy="18" rx="15" ry="8" fill="white"/>
        <ellipse cx="55" cy="22" rx="11" ry="6" fill="white"/>
      </svg>

      <!-- Title -->
      <div class="absolute top-6 left-6 z-10">
        <div class="text-xs font-bold text-orange-900/80 uppercase tracking-wider game-font">DİJİTAL İKİZİNİZ</div>
        <div class="text-2xl font-extrabold text-amber-950 game-font" x-text="farmName"></div>
        <div class="text-xs text-amber-900/70 mt-1" x-show="buildCount > 0">
          <span x-text="buildCount"></span> yapı inşa edildi
        </div>
      </div>

      <!-- Stage scene SVG -->
      <svg viewBox="0 0 900 600" class="absolute inset-0 w-full h-full" preserveAspectRatio="xMidYMax slice">

        <!-- Distant hills -->
        <path d="M 0,380 Q 200,320 400,360 T 900,340 L 900,500 L 0,500 Z" fill="#65a30d" opacity="0.4"/>
        <path d="M 0,420 Q 180,380 400,400 T 900,390 L 900,500 L 0,500 Z" fill="#84cc16" opacity="0.6"/>

        <!-- Ground line -->
        <rect x="0" y="430" width="900" height="180" fill="#86efac"/>
        <rect x="0" y="430" width="900" height="6" fill="#65a30d"/>

        <!-- Grass blades -->
        <g fill="#15803d" class="grass-blade">
          <path d="M 50,430 L 53,420 L 56,430 Z"/>
          <path d="M 130,430 L 133,418 L 136,430 Z"/>
          <path d="M 200,430 L 203,422 L 206,430 Z"/>
          <path d="M 700,430 L 703,420 L 706,430 Z"/>
          <path d="M 820,430 L 823,418 L 826,430 Z"/>
        </g>

        <!-- Path -->
        <path d="M 0,500 Q 300,490 500,500 T 900,500" stroke="#a16207" stroke-width="12" fill="none" opacity="0.5"/>

        <!-- Energy: power line (back) -->
        <g x-show="state.energy === 'grid' || state.energy === 'mixed'" x-cloak class="pop-in">
          <line x1="50" y1="380" x2="180" y2="370" stroke="#1e293b" stroke-width="1.5" opacity="0.6"/>
          <rect x="48" y="350" width="6" height="80" fill="#475569"/>
          <line x1="42" y1="360" x2="58" y2="360" stroke="#475569" stroke-width="2"/>
          <line x1="180" y1="370" x2="320" y2="380" stroke="#1e293b" stroke-width="1.5" opacity="0.6"/>
          <rect x="178" y="345" width="5" height="85" fill="#475569"/>
        </g>

        <!-- Solar -->
        <g x-show="state.energy === 'solar' || state.energy === 'mixed'" x-cloak class="pop-in">
          <g transform="translate(80, 420)">
            <line x1="0" y1="0" x2="0" y2="-20" stroke="#475569" stroke-width="3"/>
            <rect x="-25" y="-40" width="50" height="20" fill="#1e3a8a" rx="2"/>
            <rect x="-23" y="-38" width="46" height="16" fill="url(#bSolarGrad)" rx="1"/>
            <line x1="-23" y1="-30" x2="23" y2="-30" stroke="#1e40af" stroke-width="0.5"/>
            <line x1="0" y1="-38" x2="0" y2="-22" stroke="#1e40af" stroke-width="0.5"/>
            <line x1="-12" y1="-38" x2="-12" y2="-22" stroke="#1e40af" stroke-width="0.5"/>
            <line x1="12" y1="-38" x2="12" y2="-22" stroke="#1e40af" stroke-width="0.5"/>
          </g>
        </g>

        <!-- Water -->
        <g x-show="state.water === 'well'" x-cloak class="pop-in">
          <g transform="translate(820, 420)">
            <ellipse cx="0" cy="5" rx="22" ry="6" fill="#7c2d12"/>
            <rect x="-20" y="-15" width="40" height="20" fill="#a16207"/>
            <rect x="-18" y="-13" width="36" height="16" fill="#92400e"/>
            <ellipse cx="0" cy="-15" rx="20" ry="6" fill="#1e40af"/>
            <ellipse cx="0" cy="-15" rx="17" ry="4" fill="#3b82f6"/>
            <rect x="-2" y="-45" width="4" height="30" fill="#92400e"/>
            <rect x="-22" y="-50" width="44" height="6" fill="#7c2d12"/>
            <polygon points="-25,-50 -22,-58 -19,-50" fill="#92400e"/>
            <polygon points="19,-50 22,-58 25,-50" fill="#92400e"/>
            <line x1="0" y1="-40" x2="0" y2="-20" stroke="#1e293b" stroke-width="1"/>
          </g>
        </g>
        <g x-show="state.water === 'pond'" x-cloak class="pop-in">
          <g transform="translate(820, 430)">
            <ellipse cx="0" cy="5" rx="55" ry="14" fill="#1e3a8a" opacity="0.6"/>
            <ellipse cx="-3" cy="0" rx="50" ry="11" fill="#3b82f6"/>
            <ellipse cx="-3" cy="-2" rx="46" ry="9" fill="#60a5fa" opacity="0.7"/>
            <ellipse cx="-15" cy="-3" rx="8" ry="2" fill="white" opacity="0.6"/>
            <ellipse cx="10" cy="-1" rx="6" ry="1.5" fill="white" opacity="0.5"/>
          </g>
        </g>
        <g x-show="state.water === 'mains'" x-cloak class="pop-in">
          <g transform="translate(820, 410)">
            <rect x="-15" y="-30" width="30" height="40" fill="#64748b" rx="2"/>
            <rect x="-13" y="-28" width="26" height="36" fill="#94a3b8" rx="1"/>
            <circle cx="0" cy="-12" r="8" fill="#1e3a8a"/>
            <text x="0" y="-9" text-anchor="middle" font-size="7" fill="white" font-weight="bold">H₂O</text>
            <rect x="-3" y="10" width="6" height="14" fill="#475569"/>
          </g>
        </g>

        <!-- Silo (silaj) -->
        <g x-show="state.silo === 'concrete'" x-cloak class="pop-in">
          <g transform="translate(220, 280)">
            <rect x="-25" y="0" width="50" height="150" fill="#94a3b8"/>
            <rect x="-25" y="0" width="50" height="150" fill="url(#bSiloGrad)" opacity="0.4"/>
            <ellipse cx="0" cy="0" rx="25" ry="9" fill="#cbd5e1"/>
            <path d="M -25,0 Q 0,-30 25,0 Z" fill="#dc2626"/>
            <path d="M -25,0 Q 0,-30 25,0" fill="none" stroke="#b91c1c" stroke-width="1"/>
            <circle cx="0" cy="-15" r="3" fill="#1e293b"/>
            <line x1="-25" y1="40" x2="25" y2="40" stroke="#64748b" stroke-width="1" opacity="0.5"/>
            <line x1="-25" y1="80" x2="25" y2="80" stroke="#64748b" stroke-width="1" opacity="0.5"/>
            <line x1="-25" y1="120" x2="25" y2="120" stroke="#64748b" stroke-width="1" opacity="0.5"/>
            <rect x="-8" y="120" width="16" height="30" fill="#1e293b" opacity="0.8"/>
          </g>
        </g>
        <g x-show="state.silo === 'pile'" x-cloak class="pop-in">
          <g transform="translate(220, 380)">
            <ellipse cx="0" cy="50" rx="65" ry="10" fill="#15803d"/>
            <path d="M -60,50 Q 0,-30 60,50 Z" fill="#16a34a"/>
            <path d="M -55,50 Q 0,-20 55,50 Z" fill="#22c55e"/>
            <path d="M -45,50 Q 0,-5 45,50 Z" fill="#86efac" opacity="0.6"/>
            <ellipse cx="0" cy="40" rx="50" ry="6" fill="#65a30d" opacity="0.3"/>
          </g>
        </g>
        <g x-show="state.silo === 'bale'" x-cloak class="pop-in">
          <g transform="translate(220, 400)">
            <g class="bounce-soft">
              <circle cx="-30" cy="20" r="22" fill="#fbbf24"/>
              <circle cx="-30" cy="20" r="22" fill="url(#bBaleGrad)" opacity="0.4"/>
              <line x1="-50" y1="20" x2="-10" y2="20" stroke="#a16207" stroke-width="1.5"/>
              <line x1="-30" y1="0" x2="-30" y2="40" stroke="#a16207" stroke-width="1.5"/>
            </g>
            <g class="bounce-soft" style="animation-delay: 0.5s">
              <circle cx="30" cy="20" r="22" fill="#fbbf24"/>
              <circle cx="30" cy="20" r="22" fill="url(#bBaleGrad)" opacity="0.4"/>
              <line x1="10" y1="20" x2="50" y2="20" stroke="#a16207" stroke-width="1.5"/>
              <line x1="30" y1="0" x2="30" y2="40" stroke="#a16207" stroke-width="1.5"/>
            </g>
            <g>
              <circle cx="0" cy="-15" r="22" fill="#facc15"/>
              <line x1="-20" y1="-15" x2="20" y2="-15" stroke="#a16207" stroke-width="1.5"/>
              <line x1="0" y1="-35" x2="0" y2="5" stroke="#a16207" stroke-width="1.5"/>
            </g>
          </g>
        </g>

        <!-- MAIN BARN -->
        <g x-show="state.barn === 'free'" x-cloak class="pop-in">
          <g transform="translate(450, 280)">
            <ellipse cx="0" cy="160" rx="160" ry="15" fill="black" opacity="0.15"/>
            <rect x="-140" y="30" width="280" height="130" fill="#dc2626"/>
            <rect x="-140" y="30" width="280" height="130" fill="url(#bBarnGrad)" opacity="0.2"/>
            <polygon points="-140,30 0,-50 140,30" fill="#7f1d1d"/>
            <polygon points="-140,30 0,-50 0,30" fill="#991b1b"/>
            <!-- white trim -->
            <rect x="-140" y="30" width="280" height="6" fill="white"/>
            <rect x="-140" y="154" width="280" height="6" fill="white"/>
            <!-- big sliding doors -->
            <rect x="-130" y="60" width="60" height="100" fill="#1e293b" opacity="0.5"/>
            <rect x="-70" y="60" width="60" height="100" fill="#1e293b" opacity="0.5"/>
            <rect x="10" y="60" width="60" height="100" fill="#1e293b" opacity="0.5"/>
            <rect x="70" y="60" width="60" height="100" fill="#1e293b" opacity="0.5"/>
            <line x1="-100" y1="60" x2="-100" y2="160" stroke="white" stroke-width="2"/>
            <line x1="-40" y1="60" x2="-40" y2="160" stroke="white" stroke-width="2"/>
            <line x1="40" y1="60" x2="40" y2="160" stroke="white" stroke-width="2"/>
            <line x1="100" y1="60" x2="100" y2="160" stroke="white" stroke-width="2"/>
            <!-- DAIRYMIND sign -->
            <rect x="-50" y="-25" width="100" height="20" fill="#fbbf24" rx="3"/>

          </g>
        </g>
        <g x-show="state.barn === 'tie'" x-cloak class="pop-in">
          <g transform="translate(450, 290)">
            <ellipse cx="0" cy="150" rx="130" ry="13" fill="black" opacity="0.15"/>
            <rect x="-115" y="40" width="230" height="110" fill="#fb923c"/>
            <rect x="-115" y="40" width="230" height="110" fill="url(#bBarnGrad)" opacity="0.2"/>
            <polygon points="-115,40 0,-30 115,40" fill="#7c2d12"/>
            <rect x="-115" y="40" width="230" height="5" fill="white"/>
            <!-- closed door -->
            <rect x="-25" y="90" width="50" height="60" fill="#451a03"/>
            <circle cx="-12" cy="120" r="2" fill="#fbbf24"/>
            <!-- windows -->
            <rect x="-95" y="65" width="20" height="20" fill="#7dd3fc" stroke="#451a03" stroke-width="2"/>
            <rect x="-65" y="65" width="20" height="20" fill="#7dd3fc" stroke="#451a03" stroke-width="2"/>
            <rect x="45" y="65" width="20" height="20" fill="#7dd3fc" stroke="#451a03" stroke-width="2"/>
            <rect x="75" y="65" width="20" height="20" fill="#7dd3fc" stroke="#451a03" stroke-width="2"/>
            <line x1="-85" y1="65" x2="-85" y2="85" stroke="#451a03" stroke-width="2"/>
            <line x1="-55" y1="65" x2="-55" y2="85" stroke="#451a03" stroke-width="2"/>
            <line x1="55" y1="65" x2="55" y2="85" stroke="#451a03" stroke-width="2"/>
            <line x1="85" y1="65" x2="85" y2="85" stroke="#451a03" stroke-width="2"/>
          </g>
        </g>
        <g x-show="state.barn === 'open'" x-cloak class="pop-in">
          <g transform="translate(450, 340)">
            <ellipse cx="0" cy="95" rx="180" ry="12" fill="black" opacity="0.1"/>
            <!-- canopy -->
            <rect x="-100" y="20" width="200" height="8" fill="#7c2d12"/>
            <polygon points="-100,20 -80,0 80,0 100,20" fill="#92400e"/>
            <!-- support posts -->
            <rect x="-90" y="28" width="6" height="70" fill="#451a03"/>
            <rect x="-30" y="28" width="6" height="70" fill="#451a03"/>
            <rect x="24" y="28" width="6" height="70" fill="#451a03"/>
            <rect x="84" y="28" width="6" height="70" fill="#451a03"/>
            <!-- fence -->
            <line x1="-150" y1="100" x2="150" y2="100" stroke="#92400e" stroke-width="4"/>
            <line x1="-150" y1="80" x2="150" y2="80" stroke="#92400e" stroke-width="2"/>
            <g stroke="#7c2d12" stroke-width="3">
              <line x1="-130" y1="75" x2="-130" y2="105"/>
              <line x1="-90" y1="75" x2="-90" y2="105"/>
              <line x1="-50" y1="75" x2="-50" y2="105"/>
              <line x1="50" y1="75" x2="50" y2="105"/>
              <line x1="90" y1="75" x2="90" y2="105"/>
              <line x1="130" y1="75" x2="130" y2="105"/>
            </g>
          </g>
        </g>

        <!-- Cooling fan on barn -->
        <g x-show="state.barn && state.barn !== 'open'" x-cloak class="pop-in">
          <g transform="translate(530, 250)">
            <rect x="-12" y="-12" width="24" height="24" fill="#475569" rx="3"/>
            <circle cx="0" cy="0" r="9" fill="#1e293b"/>
            <g class="spin-slow">
              <path d="M 0,-9 Q 3,-3 0,0 Q -3,-3 0,-9 Z" fill="#94a3b8"/>
              <path d="M 9,0 Q 3,3 0,0 Q 3,-3 9,0 Z" fill="#94a3b8"/>
              <path d="M 0,9 Q -3,3 0,0 Q 3,3 0,9 Z" fill="#94a3b8"/>
              <path d="M -9,0 Q -3,-3 0,0 Q -3,3 -9,0 Z" fill="#94a3b8"/>
            </g>
            <circle cx="0" cy="0" r="2" fill="#fbbf24"/>
          </g>
        </g>

        <!-- Milking parlor (right side) -->
        <g x-show="state.parlor === 'herringbone'" x-cloak class="pop-in">
          <g transform="translate(680, 360)">
            <ellipse cx="0" cy="80" rx="70" ry="10" fill="black" opacity="0.15"/>
            <rect x="-60" y="0" width="120" height="80" fill="#bfdbfe"/>
            <polygon points="-60,0 0,-40 60,0" fill="#1e40af"/>
            <rect x="-60" y="0" width="120" height="4" fill="white"/>
            <rect x="-50" y="20" width="25" height="40" fill="#7dd3fc" stroke="#1e3a8a" stroke-width="2"/>
            <rect x="25" y="20" width="25" height="40" fill="#7dd3fc" stroke="#1e3a8a" stroke-width="2"/>
            <rect x="-12" y="35" width="24" height="45" fill="#1e293b"/>
            <text x="0" y="-15" text-anchor="middle" font-size="9" fill="#1e3a8a" font-weight="bold" font-family="Fredoka">SAĞIM</text>
          </g>
        </g>
        <g x-show="state.parlor === 'robot'" x-cloak class="pop-in">
          <g transform="translate(680, 360)">
            <ellipse cx="0" cy="80" rx="55" ry="10" fill="black" opacity="0.15"/>
            <rect x="-45" y="0" width="90" height="80" fill="#e0e7ff"/>
            <polygon points="-45,0 0,-30 45,0" fill="#4338ca"/>
            <rect x="-45" y="0" width="90" height="4" fill="white"/>
            <!-- robot inside -->
            <rect x="-25" y="20" width="50" height="50" fill="#312e81" rx="4"/>
            <rect x="-20" y="25" width="40" height="20" fill="#a5b4fc" rx="2"/>
            <circle cx="-8" cy="33" r="2.5" fill="#fbbf24"/>
            <circle cx="0" cy="33" r="2.5" fill="#22c55e"/>
            <circle cx="8" cy="33" r="2.5" fill="#3b82f6"/>
            <g class="pulse-soft">
              <rect x="-3" y="45" width="6" height="20" fill="#94a3b8"/>
              <circle cx="0" cy="65" r="4" fill="#475569"/>
            </g>
            <text x="0" y="-10" text-anchor="middle" font-size="9" fill="#312e81" font-weight="bold" font-family="Fredoka">🤖 ROBOT</text>
          </g>
        </g>
        <g x-show="state.parlor === 'rotary'" x-cloak class="pop-in">
          <g transform="translate(680, 360)">
            <ellipse cx="0" cy="80" rx="65" ry="10" fill="black" opacity="0.15"/>
            <rect x="-55" y="20" width="110" height="60" fill="#bfdbfe"/>
            <polygon points="-55,20 0,-10 55,20" fill="#1e40af"/>
            <circle cx="0" cy="50" r="40" fill="#475569"/>
            <g class="spin-slow">
              <circle cx="0" cy="50" r="35" fill="#94a3b8"/>
              <circle cx="-25" cy="50" r="4" fill="#1e293b"/>
              <circle cx="25" cy="50" r="4" fill="#1e293b"/>
              <circle cx="0" cy="25" r="4" fill="#1e293b"/>
              <circle cx="0" cy="75" r="4" fill="#1e293b"/>
              <circle cx="-18" cy="32" r="4" fill="#1e293b"/>
              <circle cx="18" cy="32" r="4" fill="#1e293b"/>
              <circle cx="-18" cy="68" r="4" fill="#1e293b"/>
              <circle cx="18" cy="68" r="4" fill="#1e293b"/>
            </g>
            <circle cx="0" cy="50" r="8" fill="#1e293b"/>
            <text x="0" y="-2" text-anchor="middle" font-size="9" fill="#1e3a8a" font-weight="bold" font-family="Fredoka">⟳ KARUSEL</text>
          </g>
        </g>

        <!-- Milk tank -->
        <g x-show="state.tank" x-cloak class="pop-in">
          <g :transform="`translate(620, 440) scale(${state.tank === 'small' ? 0.7 : state.tank === 'medium' ? 0.9 : 1.1})`">
            <ellipse cx="0" cy="35" rx="50" ry="8" fill="black" opacity="0.15"/>
            <rect x="-45" y="-15" width="90" height="40" fill="#cbd5e1" rx="20"/>
            <rect x="-45" y="-15" width="90" height="40" fill="url(#bTankGrad)" opacity="0.5" rx="20"/>
            <circle cx="-40" cy="5" r="6" fill="#94a3b8"/>
            <circle cx="-40" cy="5" r="3" fill="#1e293b"/>
            <rect x="-15" y="-30" width="30" height="15" fill="#475569" rx="2"/>
            <rect x="-10" y="-32" width="6" height="4" fill="#1e293b"/>
            <rect x="4" y="-32" width="6" height="4" fill="#1e293b"/>
            <text x="0" y="9" text-anchor="middle" font-size="9" fill="#1e293b" font-weight="bold" font-family="Fredoka" x-text="(state.tank === 'small' ? '500L' : state.tank === 'medium' ? '2000L' : '5000L')"></text>
          </g>
        </g>

        <!-- Manure / waste -->
        <g x-show="state.manure === 'lagoon'" x-cloak class="pop-in">
          <g transform="translate(330, 460)">
            <ellipse cx="0" cy="10" rx="55" ry="12" fill="#451a03"/>
            <ellipse cx="0" cy="6" rx="50" ry="10" fill="#78350f"/>
            <ellipse cx="0" cy="3" rx="46" ry="8" fill="#92400e"/>
            <ellipse cx="-12" cy="2" rx="6" ry="2" fill="#a16207" opacity="0.7"/>
            <ellipse cx="15" cy="3" rx="5" ry="1.5" fill="#a16207" opacity="0.7"/>
          </g>
        </g>
        <g x-show="state.manure === 'compost'" x-cloak class="pop-in">
          <g transform="translate(330, 450)">
            <ellipse cx="0" cy="20" rx="50" ry="10" fill="#451a03"/>
            <path d="M -45,15 Q 0,-25 45,15 L 45,20 L -45,20 Z" fill="#78350f"/>
            <path d="M -45,15 Q 0,-25 45,15" stroke="#92400e" stroke-width="2" fill="none"/>
            <ellipse cx="-15" cy="-10" rx="5" ry="3" fill="#5c1f0a"/>
            <ellipse cx="10" cy="-15" rx="4" ry="2" fill="#5c1f0a"/>
            <g class="smoke-rise">
              <ellipse cx="-5" cy="-20" rx="8" ry="5" fill="white" opacity="0.6"/>
            </g>
            <g class="smoke-rise" style="animation-delay: 1.5s">
              <ellipse cx="12" cy="-20" rx="6" ry="4" fill="white" opacity="0.6"/>
            </g>
            <g class="smoke-rise" style="animation-delay: 3s">
              <ellipse cx="-12" cy="-22" rx="5" ry="3" fill="white" opacity="0.6"/>
            </g>
          </g>
        </g>
        <g x-show="state.manure === 'biogas'" x-cloak class="pop-in">
          <g transform="translate(330, 430)">
            <ellipse cx="0" cy="50" rx="45" ry="10" fill="black" opacity="0.15"/>
            <circle cx="0" cy="20" r="42" fill="#15803d"/>
            <circle cx="0" cy="20" r="42" fill="url(#bBioGrad)" opacity="0.4"/>
            <circle cx="-12" cy="10" r="8" fill="#22c55e" opacity="0.6"/>
            <circle cx="15" cy="8" r="5" fill="#22c55e" opacity="0.5"/>
            <rect x="-3" y="50" width="6" height="20" fill="#475569"/>
            <text x="0" y="22" text-anchor="middle" font-size="10" fill="white" font-weight="bold" font-family="Fredoka">⚡ BİYOGAZ</text>
            <g class="smoke-rise">
              <ellipse cx="35" cy="-15" rx="4" ry="3" fill="#86efac" opacity="0.7"/>
            </g>
          </g>
        </g>

        <!-- Cows walking -->
        <g x-show="state.herdSize > 0" x-cloak>
          <template x-for="(_, i) in Math.min(Math.ceil(state.herdSize / 3), 12)" :key="'bcow-'+i">
            <g class="pop-in" :style="`animation-delay: ${0.1 + i*0.1}s`">
              <g class="cow-walk" :style="`animation-delay: ${i * 0.7}s; animation-duration: ${7 + (i%3)}s`">
                <g :transform="`translate(${280 + (i%4)*40}, ${460 + (i%2)*15})`">
                  <ellipse cx="0" cy="5" rx="16" ry="3" fill="black" opacity="0.2"/>
                  <!-- body -->
                  <ellipse cx="0" cy="-3" rx="14" ry="9" fill="white"/>
                  <!-- spots -->
                  <ellipse cx="-3" cy="-5" rx="4" ry="3" fill="#1e293b"/>
                  <ellipse cx="5" cy="-1" rx="3.5" ry="2.5" fill="#1e293b"/>
                  <!-- head -->
                  <ellipse cx="-12" cy="-5" rx="6" ry="5" fill="white"/>
                  <circle cx="-15" cy="-7" r="1" fill="#1e293b"/>
                  <!-- ears -->
                  <ellipse cx="-15" cy="-9" rx="2" ry="3" fill="#fda4af"/>
                  <!-- legs -->
                  <rect x="-10" y="3" width="2" height="6" fill="#1e293b"/>
                  <rect x="-5" y="3" width="2" height="6" fill="#1e293b"/>
                  <rect x="5" y="3" width="2" height="6" fill="#1e293b"/>
                  <rect x="10" y="3" width="2" height="6" fill="#1e293b"/>
                  <!-- tail -->
                  <line x1="13" y1="-5" x2="18" y2="-2" stroke="#1e293b" stroke-width="1.5"/>
                </g>
              </g>
            </g>
          </template>
        </g>

        <!-- defs -->
        <defs>
          <linearGradient id="bSolarGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.6"/>
          </linearGradient>
          <linearGradient id="bSiloGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#475569" stop-opacity="0.6"/>
            <stop offset="50%" stop-color="white" stop-opacity="0"/>
            <stop offset="100%" stop-color="#475569" stop-opacity="0.6"/>
          </linearGradient>
          <linearGradient id="bBaleGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#a16207" stop-opacity="0.3"/>
          </linearGradient>
          <linearGradient id="bBarnGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="black" stop-opacity="0.3"/>
          </linearGradient>
          <linearGradient id="bTankGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#475569" stop-opacity="0.3"/>
          </linearGradient>
          <linearGradient id="bBioGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="black" stop-opacity="0.4"/>
          </linearGradient>
        </defs>
      </svg>

      <!-- Empty state -->
      <div x-show="buildCount === 0" x-cloak class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <div class="bg-white/90 backdrop-blur px-6 py-5 rounded-3xl shadow-xl text-center">
          <div class="text-5xl mb-2 bounce-soft">🏗️</div>
          <div class="text-base font-bold text-slate-700 game-font">Soldan seçim yapın!</div>
          <div class="text-xs text-slate-500 mt-1">Her seçim çiftliğinize bir yapı ekler</div>
        </div>
      </div>

      <!-- Toast on build -->
      <div x-show="lastBuild" x-cloak x-transition.opacity
        class="absolute bottom-6 right-6 bg-gradient-to-r from-orange-500 to-amber-500 text-white px-5 py-3 rounded-2xl shadow-xl z-10 build-flash">
        <div class="flex items-center gap-2">
          <span class="text-2xl" x-text="lastBuild?.icon"></span>
          <div>
            <div class="text-[10px] font-bold uppercase tracking-wider opacity-80 game-font">İnşa Edildi!</div>
            <div class="text-sm font-bold" x-text="lastBuild?.label"></div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<script>
function builder() {
  return {
    farmName: 'Yılmaz Süt Çiftliği',
    state: { barn: null, parlor: null, tank: null, silo: null, energy: null, water: null, manure: null, herdSize: 0 },
    opts: {
      barn: [
        { id: 'free', icon: '🏠', label: 'Serbest Dolaşımlı' },
        { id: 'tie', icon: '🔒', label: 'Bağlı Sistem' },
        { id: 'open', icon: '🌤', label: 'Açık Padok' }
      ],
      parlor: [
        { id: 'herringbone', icon: '⚙️', label: 'Balık Sırtı' },
        { id: 'rotary', icon: '🎡', label: 'Karusel' },
        { id: 'robot', icon: '🤖', label: 'Robotik (AMS)' }
      ],
      tank: [
        { id: 'small', icon: '🥛', label: '500L' },
        { id: 'medium', icon: '🥛🥛', label: '2000L' },
        { id: 'large', icon: '🥛🥛🥛', label: '5000L+' }
      ],
      silo: [
        { id: 'concrete', icon: '🏛', label: 'Beton' },
        { id: 'pile', icon: '🌾', label: 'Yığın' },
        { id: 'bale', icon: '🌽', label: 'Balya' }
      ],
      energy: [
        { id: 'grid', icon: '⚡', label: 'Şebeke' },
        { id: 'solar', icon: '☀️', label: 'Güneş (GES)' },
        { id: 'mixed', icon: '🔋', label: 'Karma' }
      ],
      water: [
        { id: 'well', icon: '🪣', label: 'Kuyu' },
        { id: 'pond', icon: '🏞', label: 'Gölet' },
        { id: 'mains', icon: '🚰', label: 'Şebeke' }
      ],
      manure: [
        { id: 'lagoon', icon: '🟫', label: 'Lagün' },
        { id: 'compost', icon: '♻️', label: 'Kompost' },
        { id: 'biogas', icon: '🟢', label: 'Biyogaz' }
      ]
    },
    lastBuild: null,
    init() {},
    get buildCount() {
      let n = 0;
      ['barn','parlor','tank','silo','energy','water','manure'].forEach(k => { if (this.state[k]) n++; });
      if (this.state.herdSize > 0) n++;
      return n;
    },
    select(key, value) {
      const prev = this.state[key];
      this.state[key] = (prev === value) ? null : value;
      if (this.state[key]) {
        const opt = this.opts[key].find(o => o.id === value);
        this.lastBuild = { icon: opt.icon, label: opt.label };
        setTimeout(() => { this.lastBuild = null; }, 2200);
      }
    },
    reset() {
      this.state = { barn: null, parlor: null, tank: null, silo: null, energy: null, water: null, manure: null, herdSize: 0 };
      this.lastBuild = null;
    }
  }
}
</script>
</body>
</html>
